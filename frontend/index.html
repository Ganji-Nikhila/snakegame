<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYS.CORE // V1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              neon: {
                cyan: '#0ff',
                magenta: '#f0f',
                dark: '#000',
                panel: '#0a0a0a',
              }
            },
            fontFamily: {
              mono: ['VT323', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #000;
        color: #0ff;
        margin: 0;
        overflow-x: hidden;
        text-transform: uppercase;
        font-family: 'VT323', monospace;
      }
      
      /* Harsh Scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
        border-left: 1px solid #333;
      }
      ::-webkit-scrollbar-thumb {
        background: #f0f;
        border: 1px solid #000;
      }

      /* Glitch Text Effect */
      .glitch {
        position: relative;
        color: #fff;
        display: inline-block;
      }
      .glitch::before, .glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }
      .glitch::before {
        left: 3px;
        text-shadow: -2px 0 #f0f;
        clip: rect(24px, 550px, 90px, 0);
        animation: glitch-anim-2 3s infinite linear alternate-reverse;
      }
      .glitch::after {
        left: -3px;
        text-shadow: -2px 0 #0ff;
        clip: rect(85px, 550px, 140px, 0);
        animation: glitch-anim 2.5s infinite linear alternate-reverse;
      }
      @keyframes glitch-anim {
        0% { clip: rect(14px, 9999px, 12px, 0); }
        20% { clip: rect(85px, 9999px, 90px, 0); }
        40% { clip: rect(22px, 9999px, 45px, 0); }
        60% { clip: rect(98px, 9999px, 13px, 0); }
        80% { clip: rect(54px, 9999px, 78px, 0); }
        100% { clip: rect(32px, 9999px, 55px, 0); }
      }
      @keyframes glitch-anim-2 {
        0% { clip: rect(65px, 9999px, 100px, 0); }
        20% { clip: rect(12px, 9999px, 54px, 0); }
        40% { clip: rect(89px, 9999px, 23px, 0); }
        60% { clip: rect(45px, 9999px, 76px, 0); }
        80% { clip: rect(23px, 9999px, 89px, 0); }
        100% { clip: rect(78px, 9999px, 12px, 0); }
      }

      /* CRT Scanlines */
      .scanlines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
        z-index: 50;
      }

      /* Static Noise */
      .static-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 49;
        opacity: 0.08;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      
      /* Screen Tear Animation */
      .screen-tear {
          animation: tear 5s infinite;
      }
      @keyframes tear {
          0%, 95% { transform: translateX(0); }
          96% { transform: translateX(-8px) skewX(2deg); }
          97% { transform: translateX(8px) skewX(-2deg); }
          98% { transform: translateX(-4px); }
          99% { transform: translateX(4px); }
          100% { transform: translateX(0); }
      }

      /* Harsh Borders */
      .border-glitch {
        border: 2px solid #0ff;
        box-shadow: 4px 4px 0px #f0f;
      }
      .border-glitch-alt {
        border: 2px solid #f0f;
        box-shadow: -4px 4px 0px #0ff;
      }
    </style>
      </head>
  <body>
    <div class="scanlines"></div>
    <div class="static-noise"></div>
    <div id="root" class="screen-tear"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.js"></script></body>
</html>
